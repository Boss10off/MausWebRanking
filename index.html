<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tournament Results</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="Logo_Maus_2013.png" alt="Tournament Logo" class="logo" />
      <div>
        <h1 class="title-main">Rangliste</h1><h1>Bierpongturnier 2026</h1>
        <p class="subtitle">Ergebnisse</p>
      </div>
    </div>

    <table id="standings-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Team</th>
          <th>Gewonnen</th>
          <th>Verloren</th>
          <th>Unentschieden</th>
          <th>Punkte</th>
        </tr>
      </thead>
      <tbody id="standings-body"></tbody>
    </table>
  </div>

  <script src="standings.js"></script>
</body>
</html>
